services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.9
    restart: always
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    environment:
      REDPANDA_ENVIRONMENT: development
    ports:
      - "9092:9092"
      - "8082:8082"

  jobmanager:
    build: ./flink
    pull_policy: never
    volumes:
      - ./flink/src/:/opt/src
      - ./flink/flink-config.yaml:/opt/flink/conf/config.yaml
    ports:
      - "8081:8081"
    expose:
      - "6123"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 800m

  taskmanager:
    build: ./flink
    pull_policy: never
    volumes:
      - ./flink/src/:/opt/src
      - ./flink/flink-config.yaml:/opt/flink/conf/config.yaml
    depends_on:
      - jobmanager
    expose:
      - "6121"
      - "6122"
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 800m
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard/src:/app/src
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      BACKEND: s3
      DATA_SOURCE: read_json_auto('s3://llm-raw/**/*.json')

volumes:
  minio_data:
